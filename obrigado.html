<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Software — Obrigado!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #66B539;
      --green-dark: #4a8a28;
      --green-light: #E8F7DD;
      --dark: #151B1F;
      --dark2: #374148;
      --white: #ffffff;
      --gray: #f5f7f4;
      --text: #2d3436;
      --text-dim: #636e72;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background: var(--white);
    }
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 60px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(102,181,57,0.15);
    }
    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 20px;
      color: var(--dark);
      display: flex; align-items: center; gap: 10px;
    }
    .nav-logo span { color: var(--green); }
    .nav-logo .dot {
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      display: inline-block;
    }
    main {
      padding-top: 100px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .thank-you-container {
      max-width: 600px;
      width: 100%;
      padding: 0 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 60px 40px;
      text-align: center;
      box-shadow: 0 12px 48px rgba(0,0,0,0.08);
      border: 1px solid rgba(102,181,57,0.1);
    }
    .card .emoji {
      font-size: 72px;
      margin-bottom: 20px;
    }
    .card h1 {
      font-family: 'Syne', sans-serif;
      font-size: 36px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 12px;
    }
    .card p {
      color: var(--text-dim);
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .card strong {
      color: var(--dark);
    }
    .wa-btn {
      display: inline-block;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 16px 32px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 18px;
      cursor: pointer;
      text-decoration: none;
      margin-top: 20px;
      transition: background 0.2s, transform 0.2s;
    }
    .wa-btn:hover {
      background: var(--green-dark);
      transform: translateY(-2px);
    }
    .back {
      margin-top: 40px;
      color: var(--text-dim);
      font-size: 14px;
    }
    .back a {
      color: var(--green);
      text-decoration: none;
    }
    .back a:hover {
      text-decoration: underline;
    }
    @media (max-width: 768px) {
      nav { padding: 18px 20px; }
      .card { padding: 40px 20px; }
      .card h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo">
      <span>Meu Software</span>
      <span class="dot"></span>
    </div>
  </nav>

  <main>
    <div class="thank-you-container">
      <div class="card">
        <div class="emoji">🎉</div>
        <h1>Pagamento Realizado!</h1>
        <p>Obrigado por escolher o <strong>Meu Software</strong>.</p>
        <p>Agora, envie o comprovante de pagamento pelo WhatsApp para receber sua <strong>chave de acesso</strong> e o link para download.</p>

        <a href="https://wa.me/5521998664187?text=Olá!%20Acabei%20de%20pagar%20pelo%20Meu%20Software.%20Anexei%20o%20comprovante." class="wa-btn">
          📱 Enviar Comprovante pelo WhatsApp
        </a>
        <p class="back"><a href="/">← Voltar ao site</a></p>
      </div>
    </div>
  </main>
</body>
</html>
