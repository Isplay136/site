<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Software — Pagamento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #66B539;
      --green-dark: #4a8a28;
      --green-light: #E8F7DD;
      --dark: #151B1F;
      --dark2: #374148;
      --white: #ffffff;
      --gray: #f5f7f4;
      --text: #2d3436;
      --text-dim: #636e72;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background: var(--white);
    }
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 60px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(102,181,57,0.15);
    }
    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 20px;
      color: var(--dark);
      display: flex; align-items: center; gap: 10px;
    }
    .nav-logo span { color: var(--green); }
    .nav-logo .dot {
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      display: inline-block;
    }
    main {
      padding-top: 100px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .payment-container {
      max-width: 600px;
      width: 100%;
      padding: 0 20px;
      text-align: center;
    }
    .payment-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 36px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 12px;
    }
    .payment-header p {
      color: var(--text-dim);
      font-size: 18px;
      margin-bottom: 30px;
    }
    .qrcode-container {
      background: var(--gray);
      border-radius: 16px;
      padding: 40px;
      margin-bottom: 30px;
    }
    .qrcode-container img {
      max-width: 300px;
      margin: 0 auto;
      display: block;
      border: 1px solid rgba(102,181,57,0.2);
      border-radius: 8px;
      padding: 20px;
      background: white;
    }
    .instructions {
      background: var(--green-light);
      border-radius: 12px;
      padding: 20px;
      margin-top: 30px;
    }
    .instructions h3 {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      color: var(--dark);
      margin-bottom: 12px;
    }
    .instructions p {
      color: var(--text-dim);
      margin-bottom: 10px;
    }
    .wa-btn {
      display: inline-block;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 14px 24px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
      margin-top: 20px;
      transition: background 0.2s;
    }
    .wa-btn:hover { background: var(--green-dark); }
    @media (max-width: 768px) {
      nav { padding: 18px 20px; }
      .payment-container { padding: 0 10px; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo">
      <span>Meu Software</span>
      <span class="dot"></span>
    </div>
  </nav>

  <main>
    <div class="payment-container">
      <div class="payment-header">
        <h1>Pague via PIX</h1>
        <p>Escaneie o QR Code abaixo para concluir o pagamento.</p>
      </div>

      <div class="qrcode-container">
        <!-- SUBSTITUA O LINK ABAIXO PELO SEU QR CODE PIX OU IMAGEM -->
        <img src="https://via.placeholder.com/300x300?text=QR+Code+PIX" alt="QR Code PIX">
        <p><strong>Chave PIX:</strong> seu-pix@exemplo.com</p>
      </div>

      <div class="instructions">
        <h3>Após o pagamento:</h3>
        <p>1. Tire um print ou salve o comprovante de pagamento.</p>
        <p>2. Entre em contato pelo WhatsApp com o comprovante e o plano escolhido.</p>
        <a href="https://wa.me/5562984657594?text=Olá!%20Acabei%20de%20pagar%20pelo%20Meu%20Software.%20Anexei%20o%20comprovante." class="wa-btn">
          📱 Enviar Comprovante pelo WhatsApp
        </a>
      </div>
    </div>
  </main>
</body>
</html>
